  <path d="M14 44 L26 25 L40 23 L50 44" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Fuel tank -->
  <path d="M26 25 L40 23 L41 31 L24 31 Z" fill="#6366f1"/>
