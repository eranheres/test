  <line x1="40" y1="23" x2="35" y2="19" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="19" x2="37" y2="23" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <!-- Exhaust pipe -->
  <path d="M23 38 L14 42" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
